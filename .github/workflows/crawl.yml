name: Homeplus Crawl & Update

on:
  schedule:
    # 매주 월요일 오전 6시 KST (= 일요일 21:00 UTC)
    - cron: '0 21 * * 0'
  workflow_dispatch:
    # 수동 실행 허용

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run Homeplus crawler
        run: python scripts/crawl_hp_full.py

      - name: Merge HP data into courses_all.json
        run: python scripts/parse_hp_to_courses.py

      - name: Check for data changes
        id: changes
        run: |
          git diff --quiet data/hp_live.json data/courses_all.json data/courses_live.json \
            && echo "changed=false" >> $GITHUB_OUTPUT \
            || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hp_live.json data/courses_all.json data/courses_live.json
          git commit -m "chore: auto-update homeplus courses $(date +'%Y-%m-%d')"
          git push

      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No changes in HP data — nothing to commit."
