    <script type="text/javascript">

        var makeSearchModel = function () {
            var model = {};
            var arr = [];

            $("div.footer_top_scroll > button").each(function () {
                var id = $(this).attr("id");
                var txt = $(this).find("span").text();
                var data = $(this).data();

                var rtn = {
                    id: id,
                    txt: txt,
                    data: data
                };



                arr.push(rtn);
            });
            model.prm = arr;

            return model;
        }

        var sendSearchModel = function () {

            var model = makeSearchModel();
            model.word = $("input.ipt_search").val();

            if (model.word != "" && model.word.length < 2) {
                alert("검색어는 두글자 이상 입력해주세요.");
                return false;
            }

            if (model.word == "" && model.prm.length < 1) {
                alert("검색 조건을 추가해주세요.");
                return false;
            }

            if (model.word == "" && model.prm.filter(function (x) { return x.data.storeCode; }).length < 1) {
                alert("지점을 선택해주세요.");
                return false;
            }

            $.redirect("/Lecture/SearchResult", model, "POST", null, null, true);
        }

        $(function () {

            var areaList = Store.Area.List;
            //console.log(areaList);

            // 트리메뉴 세팅
            $(".tree_menu_1 .btn_tree_dpt2").each(function () {
                var txt = $(this).find("span:eq(0)").text();
                var ul = $(this).next();
                //ul.find("li").remove();
                Store.Area.List.filter(function (x) { return x.AreaName == txt; }).forEach(function (e) {
                    // 지역 전체
                    var arrCode = Object.keys(e.Info).map(function (idx) { return e.Info[idx].StoreCode; });
                    ul.append("<li><button type=\"button\" class=\"btn_depth_3 btn_filter_add\" data-store-code=\"" + arrCode.join('|') + "\"><span>" + e.AreaName + " 전체</span></button></li>");
                    // 지점
                    e.Info.forEach(function (t) {
                        ul.append("<li><button type=\"button\" class=\"btn_depth_3 btn_filter_add\" data-store-code=\"" + t.StoreCode + "\"><span>" + t.StoreName + "</span></button></li>");
                    });
                });
            });
        });
    </script>
    <script>
        // 문화센터 개선 2023
        $(function () {
            var isFull = false;

            // 트리메뉴 초기화
            $('.newHome_search_wrap .search_body .tree_menu').each(function () {
                var tree_menu_idx = $(this).index() + 1;
                $('>li', this).each(function () {
                    if ($(this).hasClass('depth_2_type2')) {
                        $(this).attr('data-id', 'item_' + tree_menu_idx + '_' + $(this).index());
                    } else {
                        var depth_2_idx = $(this).index();
                        $('.depth_3 > li', this).each(function () {
                            $(this).attr('data-id', 'item_' + tree_menu_idx + '_' + depth_2_idx + '_' + $(this).index());
                        })
                    }
                })
            })

            // 검색 조건 추가 버튼 클릭
            $(document).on('click', '.btn_filter_add', function () {
                var item_id = $(this).closest('li').attr('data-id');
                var txt = $('span', this).text();
                var add_btn;
                var age = 0;

                if ($(this).hasClass('ipt_add')) {
                    if (!$(this).closest('li').find('.ipt_writing').val()) {
                        alert('우리아이 개월수 를 입력해주세요.');
                        return;
                    }
                    age = $(this).closest('li').find('.ipt_writing').val();
                    txt = age + ' 개월';
                    $(this).data("lectureAge", age);
                }

                if (!$(this).hasClass('on') && $('#' + item_id).length == 0) {
                    // 최대 10개
                    if ($('.footer_top_scroll button').length >= 10) {
                        isFull = true;
                        alert("검색조건은 10개까지 선택하실 수 있습니다.");
                        return;
                    }
                    if (!$(this).hasClass('btn_tree_dpt2_type2')) $(this).addClass('on');
                    add_btn = "<button type='button' id='" + item_id + "' class='btn_select_item sub_dept3_item'><span>" + txt + "</span></button>";
                    $('.footer_top_scroll').append($(add_btn).data($(this).data()));
                } else {
                    if (!$(this).hasClass('btn_tree_dpt2_type2')) $(this).removeClass('on');
                    $('#' + item_id).remove();
                }

                // 최대 10개: 추가 시점에 대한 처리 때문에..
                isFull = false;
                //console.log($(this).data());
            });
            // 검색 조건 삭제
            $(document).on('click', '.btn_select_item', function () {
                $('.btn_filter_add', '.newHome_search_wrap .search_body .tree_wrap *[data-id="' + $(this).attr('id') + '"]').removeClass('on');
                $(this).remove();
            });
            // 검색 초기화
            $(document).on('click', '.newHome_search_wrap footer .btn_reload', function () {
                $('.newHome_search_wrap .footer_top_scroll .btn_select_item').each(function () {
                    $('.btn_filter_add', '.newHome_search_wrap .search_body .tree_wrap *[data-id="' + $(this).attr('id') + '"]').removeClass('on');
                    $(this).remove();
                });
                $(".myStore__btn").removeClass("myStore__btn--check");
            });

            // 트리메뉴 뎁스1 클릭
            $(document).on('click', '.menu_depth_1_wrap .btn_depth_1', function () {
                var depth_3 = $('.tree_menu.on .depth_3');
                depth_3.slideUp(0);
                $('.newHome_search_wrap .search_body .tree_menu').removeClass('on');
                $('.menu_depth_1_wrap > ul > li').removeClass('on');
                $('.btn_tree_dpt2:not(.btn_filter_add)').removeClass('on');
                $(this).closest('li').addClass('on');
                $('.newHome_search_wrap .search_body .tree_menu').eq($(this).closest('li').index()).addClass('on');
            })

            // 트리메뉴 뎁스2 클릭
            function tree_menu() {
                $(document).on('click', '.tree_menu.on .btn_tree_dpt2:not(".btn_tree_dpt2_type2")', function (e) {
                    var temp_el = $(this).next('ul');
                    var depth_3 = $('.tree_menu.on .depth_3');

                    depth_3.slideUp(300);

                    if (temp_el.is(':hidden')) {
                        $('.tree_menu.on .btn_tree_dpt2:not(.btn_tree_dpt2_type2)').removeClass('on');
                        $(this).addClass('on')
                        temp_el.slideDown(300);
                        $(this).find('em > span').html('하위폴더 열림');
                    } else {
                        $('.tree_menu.on .btn_tree_dpt2:not(.btn_tree_dpt2_type2)').removeClass('on');
                        temp_el.slideUp(300, function () { });
                        $(this).find('em > span').html('하위폴더 닫힘');
                    }
                    return false;
                });
                $(document).on('click', '.tree_menu.on .btn_tree_dpt2_type2', function () {
                    if (!$(this).hasClass('on')) {
                        // 최대 10개
                        if (isFull) return;
                        $(this).addClass('on');
                    } else {
                        $(this).removeClass('on');
                    }
                })
            }
            if ($('.tree_menu.on').is(':visible')) tree_menu();
        })
    </script>
