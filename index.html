<script type="text/babel">
const {useState,useMemo,useEffect,useRef,useCallback} = React;

const DEFAULT_DATA = [];
const REGIONS=["전국","서울","경기","인천","부산","대구","대전","광주","울산","세종","강원","충북","충남","전북","전남","경북","경남","제주"];

let CENTER_COORDS={};
let USER_POS=null;
let TRAVEL_CACHE={};

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,toR=Math.PI/180;
  const dLat=(lat2-lat1)*toR,dLon=(lon2-lon1)*toR;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*toR)*Math.cos(lat2*toR)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function trafficFactor(distKm){
  if(distKm<30) return 2.2;
  if(distKm<80) return 1.7;
  return 1.35;
}

async function calcOSRM(origin,coordMap,onProgress){
  TRAVEL_CACHE={};
  const entries=Object.entries(coordMap).filter(([,c])=>c);
  const CHUNK=80;
  for(let i=0;i<entries.length;i+=CHUNK){
    const chunk=entries.slice(i,i+CHUNK);
    const coords=[`${origin.lng},${origin.lat}`,...chunk.map(([,c])=>`${c[1]},${c[0]}`)].join(';');
    const dests=chunk.map((_,j)=>j+1).join(';');
    try{
      const url=`https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&destinations=${dests}&annotations=distance,duration`;
      const resp=await fetch(url);
      const data=await resp.json();
      if(data.code==='Ok'){
        chunk.forEach(([name,c],j)=>{
          if(data.durations[0][j]!=null&&data.durations[0][j]>0){
            const distKm=data.distances[0][j]/1000;
            const factor=window._transport==="car"?trafficFactor(distKm):trafficFactor(distKm)*1.5;
            TRAVEL_CACHE[name]=Math.round(data.durations[0][j]*factor/60);
          } else {
            const dist=haversine(origin.lat,origin.lng,c[0],c[1])*1.4;
            TRAVEL_CACHE[name]=Math.round(window._transport==="car"?dist/40*60+10:dist/20*60+20);
          }
        });
      }
    }catch(e){
      chunk.forEach(([name,c])=>{
        const dist=haversine(origin.lat,origin.lng,c[0],c[1])*1.4;
        TRAVEL_CACHE[name]=Math.round(window._transport==="car"?dist/40*60+10:dist/20*60+20);
      });
    }
    if(onProgress) onProgress(Math.min(100,Math.round((i+chunk.length)/entries.length*100)));
  }
}

function estimateTravel(destAddr,destCenter,fromAddr){
  if(!USER_POS) return 999;
  if(TRAVEL_CACHE[destCenter]!=null) return TRAVEL_CACHE[destCenter];
  const coord=CENTER_COORDS[destCenter];
  if(!coord) return 999;
  const dist=haversine(USER_POS.lat,USER_POS.lng,coord[0],coord[1])*1.4;
  return Math.round(window._transport==="car"?dist/40*60+10:dist/20*60+20);
}

async function geocodeAddress(query){
  for(const[key,pos] of Object.entries(QUICK_GEO)){
    if(query.includes(key)) return pos;
  }
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+' 대한민국')}&format=json&limit=1`,{signal:ctrl.signal});
    clearTimeout(timer);
    const d=await r.json();
    if(d.length>0) return {lat:+d[0].lat,lng:+d[0].lon};
  }catch(e){console.log('Nominatim failed:',e);}
  return null;
}

function parseAge(s){
  if(!s)return null;
  const m=s.match(/(\d+)~(\d+)/);
  if(m)return[+m[1],+m[2]];
  const m2=s.match(/(\d+)세/);
  if(m2)return[+m2[1],+m2[1]];
  if(/유아|영유아/.test(s))return[3,7];
  if(/어린이|초등/.test(s))return[7,13];
  if(/성인|adult/i.test(s))return[18,99];
  if(/입문|초보|중급|상급/.test(s))return null;
  return null;
}

function updateScrollProgress(){
  const el=document.getElementById('scroll-progress');
  if(!el)return;
  const h=document.documentElement;
  const scrollTop=h.scrollTop||document.body.scrollTop;
  const scrollHeight=h.scrollHeight-h.clientHeight;
  const pct=scrollHeight>0?(scrollTop/scrollHeight)*100:0;
  el.style.width=pct+'%';
}

  const stats=useMemo(()=>{
    const ctrs=new Set(data.map(r=>r[1]));

    const cc={},gc={};
    data.forEach(r=>{cc[r[0]]=(cc[r[0]]||0)+1;gc[r[3]]=(gc[r[3]]||0)+1;});

    // Source distribution
    const srcDist={};
    data.forEach(r=>{
      const cat=r[0]||"기타";
      srcDist[cat]=(srcDist[cat]||0)+1;
    });

    // Time slot analysis
    const timeSlots={morning:0,afternoon:0,evening:0,unknown:0};
    data.forEach(r=>{
      const t=r[7]||"";
      const hourMatch=t.match(/(\d{1,2}):/);
      if(hourMatch){
        const h=parseInt(hourMatch[1]);
        if(h<12) timeSlots.morning++;
        else if(h<17) timeSlots.afternoon++;
        else timeSlots.evening++;
      } else {
        timeSlots.unknown++;
      }
    });

    // Day of week popularity
    const dayPop={};
    const DNAMES=["월","화","수","목","금","토","일"];
    DNAMES.forEach(d=>dayPop[d]=0);
    data.forEach(r=>{
      const day=r[6]||"";
      DNAMES.forEach(d=>{if(day.includes(d))dayPop[d]++;});
    });

    // Price analysis
    const priceRanges={"무료":0,"~5만원":0,"5~10만원":0,"10~20만원":0,"20만원~":0,"미정":0};
    data.forEach(r=>{
      const p=r[8]||"";
      const num=parseInt(p.replace(/,/g,'').match(/(\d+)/)?.[1]||"0");
      if(!p||num===0)priceRanges["미정"]++;
      else if(p.includes("무료")||num===0)priceRanges["무료"]++;
      else if(num<=50000)priceRanges["~5만원"]++;
      else if(num<=100000)priceRanges["5~10만원"]++;
      else if(num<=200000)priceRanges["10~20만원"]++;
      else priceRanges["20만원~"]++;
    });

    // Center top 10
    const centerCount={};
    data.forEach(r=>{centerCount[r[1]]=(centerCount[r[1]]||0)+1;});
    const centerTop10=Object.entries(centerCount).sort((a,b)=>b[1]-a[1]).slice(0,10);

      }
    });

    return{total:data.length,ctrs:ctrs.size,conf,need:data.length-conf,cc,gc,srcDist,timeSlots,dayPop,priceRanges,centerTop10,regionDist};

  const importCSV=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const text=ev.target.result.replace(/^﻿/,"");
      const lines=text.split("\n").filter(l=>l.trim());
      if(lines.length<2){showT("유효한 CSV가 아닙니다");return;}
      const nr=[];
      for(let i=1;i<lines.length;i++){
        const match=lines[i].match(/("(?:[^"]|"")*"|[^,]*)/g);
        if(match&&match.length>=13){
          const row=match.map(v=>v.replace(/^"|"$/g,"").replace(/""/g,'"'));
          row[2]=parseInt(row[2])||0;row[14]=parseInt(row[14])||0;
          while(row.length<17)row.push("");
          row[16]=parseInt(row[16])||0;
          nr.push(row.slice(0,17));
        }
      }
      if(nr.length>0){setData(prev=>[...prev,...nr]);showT(nr.length+"개 강좌 가져옴");}
    };
    reader.readAsText(file);e.target.value="";
  };

            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-p" onClick={doSave}>{modal==='edit'?"수정":"추가"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Memo Modal */}
      {modal==='memo'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
            <h2>메모 - {data[memoIdx]?.[4]}</h2>
            <textarea value={memoTxt} onChange={e=>setMemoTxt(e.target.value)} rows={4} placeholder="메모 입력..."
              style={{width:"100%",background:"var(--input-bg)",color:"var(--text-primary)",border:"1px solid var(--input-border)",borderRadius:6,padding:"8px 10px",fontSize:12,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-p" onClick={saveMemo}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Modal */}
      {modal==='delete'&&delIdx!==null&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
            <h2 style={{color:"#EF4444"}}>삭제 확인</h2>
            <p style={{fontSize:12,color:"var(--text-muted)"}}><b style={{color:"var(--text-primary)"}}>{data[delIdx]?.[4]}</b>를 삭제하시겠습니까?</p>
            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-d" style={{border:"none",cursor:"pointer"}} onClick={doDelete}>삭제</button>
            </div>
          </div>
        </div>
      )}

      {/* Center Detail Modal */}
      {centerModal&&(
        <div className="modal-overlay" onClick={()=>setCenterModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:700}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <h2 style={{marginBottom:4}}>{centerModal}</h2>
                <div style={{fontSize:11,color:"var(--text-secondary)",marginBottom:2}}>
                  {getCenterInfo(centerModal).addr&&<span>{"📍"} {getCenterInfo(centerModal).addr}</span>}
                </div>
                <div style={{fontSize:11,color:"var(--text-secondary)"}}>
                  {getCenterInfo(centerModal).phone&&<span>{"📞"} {getCenterInfo(centerModal).phone}</span>}
                </div>
              </div>
              <button onClick={()=>setCenterModal(null)} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:20,cursor:"pointer",padding:"0 4px"}}>{"×"}</button>
            </div>
            <div style={{fontSize:10,color:"var(--text-muted)",marginBottom:8}}>{getCenterCourses(centerModal).length}개 강좌</div>
            <div style={{maxHeight:"50vh",overflowY:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                <thead>
                  <tr>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>종목</th>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>강좌명</th>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>대상</th>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>요일</th>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>시간</th>
                    <th style={{padding:"6px",textAlign:"left",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>수강료</th>
                    <th style={{padding:"6px",textAlign:"center",color:"var(--text-secondary)",fontWeight:600,fontSize:9.5,borderBottom:"2px solid var(--table-header-border)"}}>상태</th>
                  </tr>
                </thead>
                <tbody>
                  {getCenterCourses(centerModal).map(({r,i:gi})=>{
                    const sc=SC[r[10]]||"#94A3B8";
                    return(
                      <tr key={gi} style={{borderBottom:"1px solid var(--table-row-border)"}}>
                        <td style={{padding:"5px 6px"}}><span style={{fontSize:9,color:"#FBBF24"}}>{getEmoji(r[3])} {r[3]}</span></td>
                        <td style={{padding:"5px 6px",color:"var(--text-primary)",fontWeight:500,fontSize:11}}>{r[4]}</td>
                        <td style={{padding:"5px 6px",color:"#E8A0BF",fontSize:9}}>{r[5]}</td>
                        <td style={{padding:"5px 6px",color:"var(--accent)",fontSize:9}}>{r[6]}</td>
                        <td style={{padding:"5px 6px",color:"#FFB347",fontSize:9}}>{r[7]}</td>
                        <td style={{padding:"5px 6px",color:"#95D5B2",fontSize:9}}>{r[8]}</td>
                        <td style={{padding:"5px 6px",textAlign:"center"}}><span style={{color:sc,fontWeight:700,fontSize:8.5}}>{r[10]}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* Compare Modal */}
      {showCompare&&compareItems.length>0&&(
        <div className="modal-overlay" onClick={()=>setShowCompare(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:800}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <h2 style={{marginBottom:0}}>강좌 비교 ({compareItems.length}개)</h2>
              <div style={{display:"flex",gap:6}}>
                <button className="btn-c" onClick={()=>{setCompareItems([]);setShowCompare(false);}}>초기화</button>
                <button onClick={()=>setShowCompare(false)} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:20,cursor:"pointer"}}>{"×"}</button>
              </div>
            </div>
            <div style={{overflowX:"auto"}}>
              <table className="compare-table">
                <thead>
                  <tr>
                    <th style={{width:80}}>항목</th>
                    {compareItems.map(gi=><th key={gi}>{data[gi]?.[4]?.substring(0,20)||"강좌 "+gi}</th>)}
                  </tr>
                </thead>
                <tbody>
                  {[
                    {label:"센터",idx:1},
                    {label:"종목",idx:3},
                    {label:"대상",idx:5},
                    {label:"요일",idx:6},
                    {label:"시간",idx:7},
                    {label:"수강료",idx:8},
                    {label:"강사",idx:9},
                    {label:"상태",idx:10},
                    {label:"시작일",idx:13},
                    {label:"주소",idx:15}
                  ].map(({label,idx})=>(
                    <tr key={idx}>
                      <td style={{fontWeight:600,color:"var(--text-secondary)"}}>{label}</td>
                      {compareItems.map(gi=>{
                        const val=data[gi]?.[idx]||"-";
                        const color=idx===10?(SC[val]||"var(--text)"):
                          idx===8?"#95D5B2":
                          idx===7?"#FFB347":"var(--text)";
                        return <td key={gi} style={{color}}>{val}</td>;
                      })}
                    </tr>
                  ))}
                  {settings.address&&(
                    <tr>
                      <td style={{fontWeight:600,color:"var(--text-secondary)"}}>이동시간</td>
                      {compareItems.map(gi=>{
                        const r=data[gi];
                        const t=r?getTimeFor(r):"-";
                        return <td key={gi} style={{color:"#FFB347",fontWeight:700}}>{t}분</td>;
                      })}
                    </tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* Onboarding Guide */}
      {showOnboarding&&(
        <div className="onboarding-overlay" onClick={completeOnboarding}>
          <div className="onboarding-card" onClick={e=>e.stopPropagation()}>
            <div className="icon">{ONBOARD_DATA[onboardStep].icon}</div>
            <h3>{ONBOARD_DATA[onboardStep].title}</h3>
            <p>{ONBOARD_DATA[onboardStep].desc}</p>
            <div className="onboarding-steps">
              {ONBOARD_DATA.map((_,i)=>(
                <div key={i} className={"onboarding-dot"+(i===onboardStep?" active":"")} onClick={()=>setOnboardStep(i)} style={{cursor:"pointer"}}/>
              ))}
            </div>
            <div style={{display:"flex",gap:8,justifyContent:"center"}}>
              {onboardStep>0&&(
                <button className="onboarding-btn" style={{background:"var(--input-bg)",color:"var(--text)"}} onClick={()=>setOnboardStep(s=>s-1)}>이전</button>
              )}
              {onboardStep<ONBOARD_DATA.length-1?(
                <button className="onboarding-btn" onClick={()=>setOnboardStep(s=>s+1)}>다음 ({onboardStep+1}/{ONBOARD_DATA.length})</button>
              ):(
                <button className="onboarding-btn" onClick={completeOnboarding}>시작하기!</button>
              )}
            </div>
            <button className="onboarding-skip" onClick={completeOnboarding}>건너뛰기</button>
          </div>
        </div>
      )}

      {toast&&<div className="toast" role="alert">{toast}</div>}

      {/* Scroll to top button */}
      {showScrollTop&&!showCompare&&!centerModal&&!modal&&(
        <button className="scroll-top-btn" onClick={scrollToTop} title="맨 위로">
          {"↑"}
        </button>
      )}

      {/* Mobile Bottom Navigation */}
      <nav className={"bottom-nav"+(bottomNavVisible?"":" hidden")} role="navigation" aria-label="모바일 네비게이션">
        <div className="bottom-nav-inner">
          <button className={"bottom-nav-btn"+(tab==="table"&&mobileTab==="search"?" active":"")}
            onClick={()=>{setTab("table");setMobileTab("search");if(searchRef.current)searchRef.current.focus();}} aria-label="검색">
            <span>{"🔍"}</span>검색
          </button>
          <button className={"bottom-nav-btn"+(tab==="stats"?" active":"")}
            onClick={()=>{setTab("stats");setMobileTab("stats");}} aria-label="통계">
            <span>{"📊"}</span>통계
          </button>
          <button className={"bottom-nav-btn"+(favOnly?" active":"")}
            onClick={()=>{setTab("table");setFavOnly(!favOnly);setMobileTab("fav");}} aria-label="즐겨찾기">
            <span>{"⭐"}</span>즐겨찾기
          </button>
          <button className={"bottom-nav-btn"+(mobileTab==="settings"?" active":"")}
            onClick={()=>{setMobileTab("settings");toggleTheme();}} aria-label="설정">
            <span>{"⚙️"}</span>설정
          </button>
        </div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script src="v4_patch.js"></script>
</body>
</html>
