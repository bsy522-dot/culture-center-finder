<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문화센터 강좌 파인더</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7EC8E3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#080B10;color:#D4D4D4;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
a{color:inherit;text-decoration:none}
input,select,textarea,button{font-family:inherit}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
.modal{background:#111827;border:1px solid rgba(126,200,227,0.2);border-radius:12px;padding:24px;width:92%;max-width:600px;max-height:85vh;overflow-y:auto}
.modal h2{color:#fff;font-size:16px;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:#8BA4C4;margin-bottom:3px;font-weight:600}
.modal input,.modal select{width:100%;background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:7px 10px;font-size:12px;outline:none;margin-bottom:10px}
.modal input:focus,.modal select:focus{border-color:rgba(126,200,227,0.4)}
.modal .row{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.modal .actions button{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-p{background:linear-gradient(135deg,#7EC8E3,#3AAFA9);color:#0A1628}
.btn-c{background:rgba(255,255,255,0.06);color:#aaa}
.btn-d{background:rgba(239,68,68,0.15);color:#EF4444}
.toast{position:fixed;bottom:24px;right:24px;background:#1E3A5F;color:#7EC8E3;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:600;z-index:200;border:1px solid rgba(126,200,227,0.3);animation:si .3s ease}
@keyframes si{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.sc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 16px;text-align:center}
.sc .n{font-size:22px;font-weight:900;color:#7EC8E3}
.sc .l{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}
.tb{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:4px 12px;font-size:10.5px;font-weight:600;cursor:pointer;transition:all .15s}
.tb.a{background:rgba(126,200,227,0.15);color:#7EC8E3;border-color:rgba(126,200,227,0.3)}
tr:hover td{background:rgba(126,200,227,0.06)!important}
.eb{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:4px 10px;font-size:10px;cursor:pointer}
.eb:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6)}
.setup-panel{background:linear-gradient(135deg,rgba(126,200,227,0.08),rgba(58,175,169,0.05));border:1px solid rgba(126,200,227,0.15);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.setup-panel label{font-size:10px;color:#8BA4C4;font-weight:600;margin-bottom:2px;display:block}
.setup-panel input,.setup-panel select{background:rgba(255,255,255,0.06);color:#fff;border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:5px 8px;font-size:11px;outline:none}
.setup-panel select{padding:5px 6px}
.sched-badge{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8.5px;font-weight:600;margin-left:4px}
@media(max-width:768px){
  .modal .row{grid-template-columns:1fr}
  .sg{grid-template-columns:repeat(2,1fr)!important}
  .hf{flex-direction:column;align-items:flex-start!important;gap:8px!important}
  .setup-row{flex-direction:column!important;gap:8px!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef} = React;

// Data loaded from external JSON file
const DEFAULT_DATA = [];
const REGIONS=["전국","서울","경기","인천","부산","대구","대전","광주","울산","세종","강원","충북","충남","전북","전남","경북","경남","제주"];
function getRegion(addr){
  if(!addr)return"";
  const p=addr.split(" ")[0];
  const map={"서울":"서울","경기":"경기","인천":"인천","부산":"부산","대구":"대구","대전":"대전","광주":"광주","울산":"울산","세종":"세종","강원":"강원","충북":"충북","충남":"충남","전북":"전북","전남":"전남","경북":"경북","경남":"경남","제주":"제주"};
  return map[p]||"";
}

const CATS=["백화점","대형마트","공공"];
const SL=["접수중","마감임박","대기접수","조기마감주의","접수예정","확인필요","추가모집","모집마감"];
const SC={"접수중":"#34D399","마감임박":"#FB923C","대기접수":"#FBBF24","조기마감주의":"#EF4444","접수예정":"#60A5FA","확인필요":"#94A3B8","추가모집":"#34D399","모집마감":"#EF4444"};
const CC={"백화점":"#E8A0BF","대형마트":"#95D5B2","공공":"#7EC8E3"};
const GI={
  "수영":"🏊","태권도":"🥋","축구":"⚽","농구":"🏀","펜싱":"🤺","골프":"⛳","인라인":"⛸️",
  "줄넘기":"🪢","체조":"🤸","요가/필라테스":"🧘","라켓스포츠":"🏸","체육(종합)":"🏃","체육":"🏃","종합체육":"🏅",
  "발레":"🩰","K-POP댄스":"🎤","밸리댄스":"💃","힙합댄스":"🕺","현대무용":"🩰","댄스(기타)":"💃",
  "피아노":"🎹","바이올린":"🎻","첼로":"🎻","드럼":"🥁","관악기":"🎷","기타(악기)":"🎸",
  "우쿨렐레":"🪕","국악기":"🪘","악기(기타)":"🎼","악기":"🎼",
  "미술(종합)":"🎨","회화":"🖌️","공예/만들기":"🏺","캘리그라피":"✍️","미술":"🎨",
  "보컬/노래":"🎤","뮤지컬":"🎭","음악놀이":"🎵",
  "요리":"🍳","베이킹/디저트":"🧁",
  "과학":"🔬","수학":"🔢","코딩/로봇":"🤖","바둑":"♟️","블록/레고":"🧱",
  "영어":"🇺🇸","제2외국어":"🌍","독서/논술":"📖","한자/서예":"✍️","역사":"🏛️",
  "놀이":"🧩","교구놀이":"🧩","영재교육":"🧒","사진":"📷","플라워":"🌸",
  "뷰티":"💄","아로마/캔들":"🕯️","재테크/강연":"💰","한국무용":"🪭","기타":"📌"
};
const GG={
  "⚽ 체육/스포츠":["수영","태권도","축구","농구","펜싱","골프","인라인","줄넘기","체조","요가/필라테스","라켓스포츠","체육(종합)","체육","종합체육"],
  "💃 무용/댄스":["발레","K-POP댄스","밸리댄스","한국무용","힙합댄스","현대무용","댄스(기타)"],
  "🎹 악기":["피아노","바이올린","첼로","드럼","관악기","기타(악기)","우쿨렐레","국악기","악기(기타)","악기"],
  "🎨 미술/공예":["미술(종합)","미술","회화","공예/만들기","캘리그라피"],
  "🎵 음악/공연":["보컬/노래","뮤지컬","음악놀이"],
  "🍳 요리":["요리","베이킹/디저트"],
  "🔬 사고력/교육":["과학","수학","코딩/로봇","바둑","블록/레고","교구놀이","영재교육"],
  "📖 어학/인문":["영어","제2외국어","독서/논술","한자/서예","역사"],
  "💄 생활/취미":["뷰티","플라워","아로마/캔들","사진","재테크/강연"],
  "🧩 놀이/기타":["놀이","기타"]
};
const FIELDS=["분류","센터","이동(분)","종목","강좌명","대상","요일","시간","수강료","강사","상태","전화","홈페이지","시작일","회차","주소","차량(분)"];

const LSK="cc-data-v9",LSF="cc-fav",LSM="cc-memo",LSS="cc-settings-v2";

function load(k,d){try{const s=localStorage.getItem(k);if(s){const p=JSON.parse(s);if(Array.isArray(d)?Array.isArray(p)&&p.length>0:p)return p;}}catch(e){}return d;}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

function parseAge(s){
  if(!s)return null; // 연령 정보 없음
  const m=s.match(/(\d+)~(\d+)/);
  if(m)return[+m[1],+m[2]];
  const m2=s.match(/(\d+)세/);
  if(m2)return[+m2[1],+m2[1]];
  // 텍스트 기반 매핑
  if(/유아|영유아/.test(s))return[3,7];
  if(/어린이|초등/.test(s))return[7,13];
  if(/성인|adult/i.test(s))return[18,99];
  if(/입문|초보|중급|상급/.test(s))return null; // 레벨 표기는 연령 아님
  return null;
}

function App(){
  const [data,setData]=useState(()=>load(LSK,[]));
  const [loading,setLoading]=useState(true);
  const [allData,setAllData]=useState([]);
  const [fav,setFav]=useState(()=>new Set(load(LSF,[])));
  const [memos,setMemos]=useState(()=>load(LSM,{}));
  const [settings,setSettings]=useState(()=>load(LSS,{birthYear:0,address:"",maxMin:60,transport:"public",region:"전국"}));
  const [gBy,setGBy]=useState("program");
  const [fGrp,setFGrp]=useState("전체");
  const [fCat,setFCat]=useState("전체");
  const [fStat,setFStat]=useState("전체");
  const [fDay,setFDay]=useState("전체");
  const [fTime,setFTime]=useState("신규/모집중"); // 전체, 신규강좌, 모집중, 지난강좌
  const [favOnly,setFavOnly]=useState(false);
  const [q,setQ]=useState("");
  const [sCol,setSCol]=useState(null);
  const [sAsc,setSAsc]=useState(true);
  const [modal,setModal]=useState(null); // null | 'add' | 'edit' | 'settings' | 'memo' | 'delete' | 'share'
  const [editIdx,setEditIdx]=useState(null);
  const [form,setForm]=useState(Array(17).fill(""));
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState("table");
  const [memoIdx,setMemoIdx]=useState(null);
  const [memoTxt,setMemoTxt]=useState("");
  const [delIdx,setDelIdx]=useState(null);
  const [sel,setSel]=useState(new Set());
  const [openGrp,setOpenGrp]=useState(null); // 열린 대분류
  const tt=useRef(null);

  const GROUPS=useMemo(()=>[...new Set(data.map(r=>r[3]))].sort(),[data]);
  const DAYS=["월","화","수","목","금","토","일"];

  useEffect(()=>{if(data.length>0)save(LSK,data);},[data]);
  useEffect(()=>{save(LSF,[...fav]);},[fav]);
  useEffect(()=>{save(LSM,memos);},[memos]);
  useEffect(()=>{save(LSS,settings);},[settings]);

  // Load data from JSON
  useEffect(()=>{
    const stored=load(LSK,[]);
    if(stored&&stored.length>0){
      setData(stored);setAllData(stored);setLoading(false);return;
    }
    setLoading(true);
    fetch("data/all.json")
      .then(r=>r.json())
      .then(d=>{setData(d);setAllData(d);save(LSK,d);setLoading(false);})
      .catch(e=>{console.error("Failed to load data:",e);setLoading(false);});
  },[]);

  const showT=(m)=>{setToast(m);if(tt.current)clearTimeout(tt.current);tt.current=setTimeout(()=>setToast(null),2500);};

  // Child age from birth year
  const childAge = settings.birthYear ? (new Date().getFullYear() - settings.birthYear) : 0;
  const TODAY = new Date().toISOString().slice(0,10).replace(/-/g,'.');

  const filtered=useMemo(()=>{
    const s=q.toLowerCase();
    let f=data.map((r,i)=>({r,i}));
    const getTime=(r)=>settings.transport==="car"?(r[16]||Math.round(r[2]*0.65)):r[2];
    f=f.filter(({r})=>(fCat==="전체"||r[0]===fCat)&&(fGrp==="전체"||r[3]===fGrp)&&(settings.address?getTime(r)<=settings.maxMin:true));
    // Region filter
    if(settings.region&&settings.region!=="전국")f=f.filter(({r})=>getRegion(r[15])===settings.region);
    if(fStat!=="전체")f=f.filter(({r})=>r[10]===fStat);
    if(fDay!=="전체")f=f.filter(({r})=>r[6]&&r[6].includes(fDay));
    // 시기 필터
    if(fTime!=="전체"){
      const recruiting=["접수중","마감임박","추가모집","접수예정"];
      f=f.filter(({r})=>{
        const start=r[13]||"";
        const isFuture=start?start>=TODAY:false;
        const noDate=!start;
        const isPast=start&&start<TODAY;
        const isRecruiting=recruiting.includes(r[10]);
        if(fTime==="신규강좌")return isFuture;
        if(fTime==="모집중")return isRecruiting;
        if(fTime==="신규/모집중")return isFuture||isRecruiting||noDate;
        if(fTime==="지난강좌")return isPast&&!isRecruiting;
        return true;
      });
    }
    if(favOnly)f=f.filter(({i})=>fav.has(i));
    // Filter by child age
    if(settings.birthYear && settings.birthYear>0){
      f=f.filter(({r})=>{
        const range=parseAge(r[5]);
        if(!range)return true;
        const[lo,hi]=range;
        return childAge>=lo && childAge<=hi+1;
      });
    }
    if(s)f=f.filter(({r})=>r[1].toLowerCase().includes(s)||r[4].toLowerCase().includes(s)||r[3].toLowerCase().includes(s)||(r[15]||'').toLowerCase().includes(s));
    if(sCol!==null){
      f=[...f].sort((a,b)=>{
        let va=a.r[sCol],vb=b.r[sCol];
        if(sCol===2||sCol===14)return sAsc?va-vb:vb-va;
        return sAsc?String(va).localeCompare(String(vb)):String(vb).localeCompare(String(va));
      });
    }
    return f;
  },[data,fCat,fGrp,fStat,fDay,fTime,favOnly,q,settings,sCol,sAsc,fav,childAge]);

  const grouped=useMemo(()=>{
    if(gBy==="none")return{"전체":filtered};
    const m={};
    filtered.forEach(item=>{const k=gBy==="program"?item.r[3]:item.r[1];if(!m[k])m[k]=[];m[k].push(item);});
    const s={};
    Object.keys(m).sort((a,b)=>gBy==="program"?a.localeCompare(b):(m[a][0]?.r[2]||0)-(m[b][0]?.r[2]||0)).forEach(k=>s[k]=m[k]);
    return s;
  },[filtered,gBy]);

  const stats=useMemo(()=>{
    const ctrs=new Set(data.map(r=>r[1]));
    const conf=data.filter(r=>r[10]!=="확인필요").length;
    const cc={},gc={};
    data.forEach(r=>{cc[r[0]]=(cc[r[0]]||0)+1;gc[r[3]]=(gc[r[3]]||0)+1;});
    return{total:data.length,ctrs:ctrs.size,conf,need:data.length-conf,cc,gc};
  },[data]);

  const hSort=(c)=>{if(sCol===c){setSAsc(!sAsc)}else{setSCol(c);setSAsc(true)}};
  const openAdd=()=>{setEditIdx(null);setForm(["대형마트","",30,"발레","","","매주 토","","","","접수중","","","",0,"",0]);setModal('add');};
  const openEdit=(gi)=>{setEditIdx(gi);setForm([...data[gi]]);setModal('edit');};
  const doSave=()=>{
    const f=[...form];f[2]=parseInt(f[2])||0;f[14]=parseInt(f[14])||0;f[16]=parseInt(f[16])||0;
    if(!f[1]||!f[4]){showT("센터명과 강좌명은 필수");return;}
    const nd=[...data];
    if(editIdx!==null)nd[editIdx]=f;else nd.push(f);
    setData(nd);setModal(null);showT(editIdx!==null?"수정 완료":"추가 완료");
  };
  const doDelete=()=>{
    const nd=data.filter((_,i)=>i!==delIdx);
    // 즐겨찾기 인덱스 보정
    const nf=new Set();
    fav.forEach(fi=>{if(fi<delIdx)nf.add(fi);else if(fi>delIdx)nf.add(fi-1);});
    setFav(nf);
    setData(nd);setDelIdx(null);setModal(null);showT("삭제됨");
  };
  const toggleFav=(i)=>{const n=new Set(fav);n.has(i)?n.delete(i):n.add(i);setFav(n);};
  const openMemo=(i)=>{setMemoIdx(i);setMemoTxt(memos[i]||"");setModal('memo');};
  const saveMemo=()=>{const n={...memos};if(memoTxt.trim())n[memoIdx]=memoTxt.trim();else delete n[memoIdx];setMemos(n);setModal(null);showT("메모 저장");};

  const exportCSV=()=>{
    const BOM="\uFEFF";
    const h=FIELDS.join(",");
    const rows=filtered.map(({r})=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(","));
    const csv=BOM+h+"\n"+rows.join("\n");
    const b=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const u=URL.createObjectURL(b);const a=document.createElement("a");
    a.href=u;a.download="문화센터강좌_"+new Date().toISOString().slice(0,10)+".csv";a.click();URL.revokeObjectURL(u);
    showT("CSV 다운로드 완료");
  };

  const importCSV=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const text=ev.target.result.replace(/^\uFEFF/,"");
      const lines=text.split("\n").filter(l=>l.trim());
      if(lines.length<2){showT("유효한 CSV가 아닙니다");return;}
      const nr=[];
      for(let i=1;i<lines.length;i++){
        const match=lines[i].match(/("(?:[^"]|"")*"|[^,]*)/g);
        if(match&&match.length>=13){
          const row=match.map(v=>v.replace(/^"|"$/g,"").replace(/""/g,'"'));
          row[2]=parseInt(row[2])||0;row[14]=parseInt(row[14])||0;
          while(row.length<17)row.push("");
          row[16]=parseInt(row[16])||0;

                            {gBy!=="program"&&<td style={{padding:"4px 6px"}}><span style={{background:"rgba(251,191,36,0.08)",color:"#FBBF24",padding:"1px 5px",borderRadius:3,fontSize:9}}>{GI[r[3]]||""}{r[3]}</span></td>}
                            <td style={{padding:"4px 6px",color:"#E0E0E0",fontWeight:500,fontSize:10}}>
                              {r[4]}
                              {hM&&<span style={{marginLeft:4,fontSize:8,color:"#FBBF24"}} title={memos[gi]}>📝</span>}
                            </td>
                            <td style={{padding:"4px 6px",color:"#E8A0BF",fontSize:9.5,textAlign:"center"}}>{r[5]}</td>
                            <td style={{padding:"4px 6px",color:"#7EC8E3",fontSize:9.5}}>{r[6]}</td>
                            <td style={{padding:"4px 6px",color:"#FFB347",fontWeight:600,fontSize:9.5}}>{r[7]}</td>
                            <td style={{padding:"4px 6px",color:"#95D5B2",fontSize:9.5}}>{r[8]}</td>
                            <td style={{padding:"4px 6px",fontSize:9,color:r[13]&&r[13]>=TODAY?"#34D399":r[13]?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.15)"}}>{r[13]?r[13].slice(5):"-"}{r[13]&&r[13]<TODAY?" (지남)":""}</td>
                            <td style={{padding:"4px 6px",textAlign:"center",fontSize:9,color:"rgba(255,255,255,0.4)"}}>{r[14]?`${r[14]}회`:"-"}</td>
                            <td style={{padding:"4px 6px",textAlign:"center"}}><span style={{color:sc,fontWeight:700,fontSize:9}}>{r[10]}</span></td>
                            <td style={{padding:"4px 4px",textAlign:"center",whiteSpace:"nowrap"}}>
                              <button onClick={()=>openEdit(gi)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,padding:"2px 3px"}} title="수정">✏️</button>
                              <button onClick={()=>openMemo(gi)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,padding:"2px 3px"}} title="메모">📝</button>
                              <button onClick={()=>{setDelIdx(gi);setModal('delete');}} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,padding:"2px 3px"}} title="삭제">🗑️</button>
                              {r[12]&&<a href={r[12]} target="_blank" rel="noopener noreferrer" style={{fontSize:10,padding:"2px 3px"}} title="홈페이지">🔗</a>}
                              {r[11]&&<a href={"tel:"+r[11]} style={{fontSize:10,padding:"2px 3px"}} title={r[11]}>📞</a>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            ))}
          </div>

          {!filtered.length&&<div style={{textAlign:"center",padding:40,color:"rgba(255,255,255,0.2)",fontSize:12}}>조건에 맞는 강좌가 없습니다.</div>}

          <div style={{marginTop:14,padding:"10px 12px",borderRadius:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",fontSize:9,color:"rgba(255,255,255,0.2)",lineHeight:1.8}}>
            <b>사용법:</b> 헤더에서 출생년도/지역/출발지/교통수단 설정 → 자동 필터링 · 종목 대분류 클릭 → 세부 종목 선택 · 헤더 클릭 = 정렬 · ⭐ 즐겨찾기 · 📍 카카오맵 길찾기<br/>
            <b>업데이트:</b> 각 문센 사이트에서 새 강좌 확인 후 CSV/JSON 가져오기 또는 + 추가 · JSON 공유로 다른 기기 동기화<br/>
            <b>법적 고지:</b> 본 서비스는 각 문화센터의 공개된 강좌 정보를 개인 편의를 위해 정리한 것으로, 공식 서비스가 아닙니다.
            강좌 정보(시간/수강료/접수상태 등)는 실제와 다를 수 있으며, 정확한 정보는 반드시 각 문화센터 공식 사이트 또는 전화로 확인하시기 바랍니다.
            문화센터명, 강좌명 등의 상표권은 각 사에 귀속되며, 본 서비스는 비영리 정보 제공 목적입니다.
            데이터 출처: 이마트/롯데마트/홈플러스 문화센터 공개 강좌 정보(2026.01 수집) + 공공시설 웹사이트
          </div>
        </>)}
      </div>

      {/* Add/Edit Modal */}
      {(modal==='add'||modal==='edit')&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h2>{modal==='edit'?"✏️ 강좌 수정":"➕ 새 강좌 추가"}</h2>
            <div className="row">
              <div><label>센터분류 *</label><select value={form[0]} onChange={e=>uf(0,e.target.value)}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
              <div><label>센터명 *</label><input value={form[1]} onChange={e=>uf(1,e.target.value)} placeholder="예: 이마트 양재점"/></div>
            </div>
            <div className="row">
              <div><label>🚌 대중교통(분)</label><input type="number" min="1" max="120" value={form[2]} onChange={e=>uf(2,e.target.value)}/></div>
              <div><label>🚗 차량(분)</label><input type="number" min="0" max="120" value={form[16]===0?"0":form[16]||""} onChange={e=>uf(16,e.target.value)}/></div>
            </div>
            <div className="row">
              <div><label>종목</label><input value={form[3]} onChange={e=>uf(3,e.target.value)} placeholder="발레, 피아노 등" list="gl"/><datalist id="gl">{GROUPS.map(g=><option key={g} value={g}/>)}</datalist></div>
            </div>
            <div><label>강좌명 *</label><input value={form[4]} onChange={e=>uf(4,e.target.value)} placeholder="예: 유아 발레 입문"/></div>
            <div className="row">
              <div><label>대상연령</label><input value={form[5]} onChange={e=>uf(5,e.target.value)} placeholder="예: 5~7세"/></div>
              <div><label>요일</label><input value={form[6]} onChange={e=>uf(6,e.target.value)} placeholder="예: 매주 토"/></div>
            </div>
            <div className="row">
              <div><label>시간</label><input value={form[7]} onChange={e=>uf(7,e.target.value)} placeholder="예: 11:00~11:50"/></div>
              <div><label>수강료</label><input value={form[8]} onChange={e=>uf(8,e.target.value)} placeholder="예: 120,000원(12회)"/></div>
            </div>
            <div className="row">
              <div><label>강사</label><input value={form[9]} onChange={e=>uf(9,e.target.value)}/></div>
              <div><label>접수상태</label><select value={form[10]} onChange={e=>uf(10,e.target.value)}>{SL.map(s=><option key={s}>{s}</option>)}</select></div>
            </div>
            <div className="row">
              <div><label>시작일</label><input value={form[13]} onChange={e=>uf(13,e.target.value)} placeholder="2026.03.01"/></div>
              <div><label>회차수</label><input type="number" min="0" value={form[14]} onChange={e=>uf(14,e.target.value)} placeholder="12"/></div>
            </div>
            <div className="row">
              <div><label>전화번호</label><input value={form[11]} onChange={e=>uf(11,e.target.value)}/></div>
              <div><label>홈페이지</label><input value={form[12]} onChange={e=>uf(12,e.target.value)} placeholder="https://..."/></div>
            </div>
            <div><label>센터 주소</label><input value={form[15]} onChange={e=>uf(15,e.target.value)} placeholder="서울 서초구..."/></div>
            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-p" onClick={doSave}>{modal==='edit'?"수정":"추가"}</button>
            </div>
          </div>
        </div>
      )}

      {/* Memo Modal */}
      {modal==='memo'&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:400}}>
            <h2>📝 메모 - {data[memoIdx]?.[4]}</h2>
            <textarea value={memoTxt} onChange={e=>setMemoTxt(e.target.value)} rows={4} placeholder="메모 입력..."
              style={{width:"100%",background:"rgba(255,255,255,0.06)",color:"#fff",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"8px 10px",fontSize:12,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-p" onClick={saveMemo}>저장</button>
            </div>
          </div>
        </div>
      )}

      {/* Delete Modal */}
      {modal==='delete'&&delIdx!==null&&(
        <div className="modal-overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
            <h2 style={{color:"#EF4444"}}>삭제 확인</h2>
            <p style={{fontSize:12,color:"rgba(255,255,255,0.6)"}}><b style={{color:"#fff"}}>{data[delIdx]?.[4]}</b>를 삭제하시겠습니까?</p>
            <div className="actions">
              <button className="btn-c" onClick={()=>setModal(null)}>취소</button>
              <button className="btn-d" style={{border:"none",cursor:"pointer"}} onClick={doDelete}>삭제</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
